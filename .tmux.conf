# Swap Ctrl-b with Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Rebind keys to split windows
bind \ split-window -h
bind - split-window -v

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Shift+Arrow-Keys pane resizing
unbind Left
unbind Up
unbind Down
unbind Right
bind S-Left resize-pane -L 20
bind S-Up resize-pane -U 20
bind S-Down resize-pane -D 20
bind S-Right resize-pane -R 20


# Carrot keys for pane swapping
unbind {
unbind }
bind , swap-pane -U
bind . swap-pane -D
